## Featured Projects

### Urban Greening, Heat, and Biodiversity

A geospatial causal-inference project studying how urban greening and restoration interventions affect environmental and ecological outcomes.

The project focuses on treatment layers such as tree planting, grow zones, erosion/restoration projects, green stormwater infrastructure, and habitat or riparian restoration. It is designed to estimate effects on outcomes such as land-surface temperature, vegetation indices, biodiversity observations, and neighborhood environmental conditions.

**Core ideas:**

- treatment inventory construction,
- spatial causal inference,
- staggered treatment timing,
- spatial spillovers,
- environmental justice covariates, and
- reproducible geospatial data pipelines.

**Tools and methods:**

- Python,
- GeoPandas,
- pandas,
- Rasterio,
- xarray,
- PostGIS,
- scikit-learn,
- causal inference,
- spatial joins, and
- public open-data sources.

