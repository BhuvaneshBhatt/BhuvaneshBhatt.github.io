# About section
about_title: About Me
about_profile_image:
about_content: |
  **Scientific-computing and ML-validation engineer moving toward environmental and public-interest data science.**

  I build reliable computational tools for mathematical, scientific, and environmental applications. My background spans scientific software validation, symbolic computation, machine learning, statistics, numerical robustness, and reproducible data-science pipelines.

  I am especially interested in applying scientific computing, machine learning validation, geospatial analysis, causal inference, and software reliability to climate, ecology, environmental justice, biodiversity, civic technology, and other public-good domains.

# Main page content
content:
  - title: Featured Projects
    layout: list
    content:
      - layout: left
        title: Urban Greening, Heat, and Biodiversity
        quote: >
          Geospatial causal-inference project studying how urban greening and restoration interventions affect environmental and ecological outcomes.
        description: |
          This project focuses on treatment layers such as tree planting, grow zones, erosion/restoration projects, green stormwater infrastructure, and habitat or riparian restoration.

          **Tools and methods:** Python, GeoPandas, pandas, Rasterio, xarray, PostGIS, scikit-learn, causal inference, spatial joins, and public open-data sources.

      - layout: left
        title: PM2.5 and Environmental Justice Modeling
        quote: >
          Geospatial machine-learning project for modeling air-quality exposure and environmental justice patterns.
        description: |
          This project combines air-quality monitor data, weather covariates, census or environmental-justice indicators, and spatial modeling methods.

          **Tools and methods:** Python, GeoPandas, PostGIS, scikit-learn, PyTorch, GPyTorch, Gaussian processes, and spatial machine learning.

      - layout: left
        title: semialg
        quote: >
          Python package for semialgebraic geometry, cylindrical algebraic decomposition, quantifier elimination, and roadmap-style algorithms.
        description: |
          This project explores symbolic algorithms for reasoning about real polynomial systems, sign-invariant decompositions, connected components, sample points, and semialgebraic sets.

          **Tools:** Python, SymPy.

  - title: Skills
    layout: text
    content: |
      **Programming and Scientific Computing:** Python, Wolfram Language, SQL, Bash, JavaScript, NumPy, SciPy, pandas, SymPy, scikit-learn, statsmodels, PyTorch.

      **Machine Learning and Data Science:** model validation, regression testing for ML systems, preprocessing validation, classification, regression, clustering, anomaly detection, dimensionality reduction, feature extraction, interpretability checks, uncertainty-aware modeling, Gaussian processes, spatial cross-validation.

      **Geospatial, Environmental Data, and Visualization:** GeoPandas, Rasterio, xarray, PostGIS, QGIS, Tableau, spatial joins, raster/vector workflows, environmental covariates, environmental justice indicators, urban greening data, public open-data pipelines.

      **Software Engineering, Tooling, and Infrastructure:** Git, GitHub, uv, dotenv, Ruff, pyright / Pylance, pytest, CMake, Docker, Kubernetes, GitHub Actions, TeamCity, AWS, Django, FastAPI, Node.js, React, package architecture, documentation, benchmarking, reproducible notebooks, CI-oriented testing.

      **Data Engineering and Pipeline Infrastructure:** Airflow, dbt, Apache Spark, Apache Kafka, PostgreSQL, PostGIS, reproducible ETL, data validation, scheduled ingestion, batch processing, spatial data pipelines.

  - title: Experience
    layout: text
    content: |
      I have over a decade of experience working on scientific and mathematical software, including machine-learning validation, statistics and stochastic-process algorithms, symbolic computation, numerical robustness, and large-scale regression testing.

      I am particularly interested in roles involving scientific computing, data science, machine-learning validation, research software engineering, environmental data, ecological data, climate technology, civic technology, and public-interest technology.

