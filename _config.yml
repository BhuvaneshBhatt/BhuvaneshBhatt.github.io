### MultipleIntegrate

A symbolic multiple-integration package focused on region analysis, iterated integration, change-of-variables helpers, and comparisons with SymPy.

The project aims to make multiple integration more systematic by detecting common regions, supporting transformations, and producing clear symbolic workflows.

**Tools:**

- Python,
- SymPy

