### LLM API and Evaluation Toolkit

A project for experimenting with large-language-model APIs, retrieval-augmented generation, model evaluation, token and cost tracking, and reproducible LLM workflows.

The project explores practical infrastructure for interacting with multiple model providers, evaluating retrieval quality, and organizing LLM experiments in a maintainable way.

**Core ideas:**

- LLM API workflows,
- model comparison,
- token and cost tracking,
- retrieval-augmented generation,
- reranking,
- evaluation harnesses,
- reproducible notebooks.

**Tools and methods:**

- Python,
- OpenAI API,
- Claude API,
- vector search,
- reranking,
- FastAPI and
- Docker.

