  # Bhuvanesh Bhatt

**Scientific-computing and ML-validation engineer moving toward environmental and public-interest data science.**

I build reliable computational tools for mathematical, scientific, and environmental applications. My background spans scientific software validation, symbolic computation, machine learning, statistics, numerical robustness, and reproducible data-science pipelines.

I am especially interested in applying scientific computing, machine learning validation, geospatial analysis, and causal inference to climate, ecology, environmental justice, biodiversity, civic technology, and other public-good domains.

[View Projects](#featured-projects) · [Skills](#skills) · [Experience](#experience) · [Contact](#contact)

---

## About

I am a scientific-computing and machine-learning validation engineer with over a decade of experience working on mathematical and scientific software. My work has involved testing and validating algorithms across machine learning, probability and statistics, symbolic computation, numerical computation, geometry, graph theory, and related computational domains.

I am now focused on building a portfolio at the intersection of:
- scientific computing,
- machine learning and model validation,
- environmental and geospatial data science,
- symbolic and numerical mathematics,
- causal inference, and
- public-interest technology.

My goal is to contribute to technically rigorous work that supports environmental, ecological, civic, and social-good outcomes.

---

## What I Do

### Scientific Computing & Symbolic Mathematics

I work on computational tools for symbolic and numerical mathematics, including symbolic integration, semialgebraic geometry, and tensor algebra.

### Machine Learning Validation & Data Science

I have experience validating machine-learning functionality, designing regression tests, checking preprocessing behavior, evaluating numerical robustness, and building reproducible data-science workflows.

### Environmental & Geospatial Analysis

I am building portfolio projects involving environmental justice, urban greening, heat exposure, biodiversity, air quality, restoration projects, spatial spillovers, and uncertainty-aware modeling.

### Research Software Engineering

I care about correctness, maintainability, systematic testing, readable and understandable documentation, benchmarks, reproducibility, and clear, well-designed software architecture.

