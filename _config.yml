### TensorAtlas

A symbolic tensor-computation project organized around a clean separation between mathematical semantics, normalization rules, and concrete realizations.

The project explores how to represent tensors, forms, index structures, symmetries, contractions, Clifford algebra, and related symbolic objects while keeping the architecture maintainable and extensible.

**Tools:**

- Python,
- SymPy

