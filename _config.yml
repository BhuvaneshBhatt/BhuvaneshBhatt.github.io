### PM2.5 and Environmental Justice Modeling

A geospatial machine-learning project for modeling air-quality exposure and environmental justice patterns.

The project combines air-quality monitor data, weather covariates, census or environmental-justice indicators, and spatial modeling methods. It is intended to explore uncertainty-aware prediction, spatial cross-validation, and interpretable environmental risk modeling.

**Core ideas:**

- air-quality exposure modeling,
- environmental justice analysis,
- spatial cross-validation,
- Gaussian processes, and
- uncertainty estimation.

**Tools and methods:**

- Python,
- GeoPandas,
- PostGIS,
- scikit-learn,
- PyTorch,
- GPyTorch,
- Gaussian processes,
- environmental covariates, abd
- spatial machine learning.

