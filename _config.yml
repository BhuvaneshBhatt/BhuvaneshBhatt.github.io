### semialg

A Python package for semialgebraic geometry, including cylindrical algebraic decomposition, quantifier elimination, and roadmap-style algorithms.
This project explores symbolic algorithms for reasoning about real polynomial systems of equalities and inequalities, sign-invariant decompositions, connected components, sample points, and semialgebraic sets.

**Core ideas:**

- cylindrical algebraic decomposition,
- quantifier elimination,
- semialgebraic set reasoning,
- sign-invariant decomposition,
- algebraic sample points, and
- roadmap algorithms.

**Tools:**

- Python,
- SymPy

**Repository:** `TODO: add link`

